name: Update SSQ Data

on:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_ssq_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json history.json
          git commit -m "update ssq data" || echo "No changes to commit"

      - name: Push changes to GitHub
        run: git push

      - name: Sync latest data to Gitee (example)
        env:
          GITEE_USERNAME: liyanlian
          GITEE_TOKEN: 70f76ca5b6bafc9f6f7f82e0b56216f6
        run: |
          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/liyanlian/ai-double-color-ball-analyst_-releases.git"
          git push gitee HEAD:master
